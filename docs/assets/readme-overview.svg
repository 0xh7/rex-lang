  <path d="M686 278L670 265" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
  <path d="M686 278L670 291" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>

  <path d="M950 278H998" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
  <path d="M998 278L982 265" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
  <path d="M998 278L982 291" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>

  <rect x="78" y="418" width="478" height="226" rx="24" fill="#101A2D" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
  <text x="106" y="462" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Project and Package Flow</text>
  <text x="106" y="506" fill="#D8E3F0" font-family="Consolas, Menlo, monospace" font-size="20">rex init my-app</text>
  <text x="300" y="506" fill="#E5B54B" font-family="Segoe UI, Arial, sans-serif" font-size="20">-&gt;</text>
  <text x="334" y="506" fill="#D8E3F0" font-family="Consolas, Menlo, monospace" font-size="20">rex.toml</text>
  <text x="106" y="542" fill="#D8E3F0" font-family="Consolas, Menlo, monospace" font-size="20">rex add utils --path ../utils</text>
  <text x="106" y="578" fill="#D8E3F0" font-family="Consolas, Menlo, monospace" font-size="19">rex add jsonx --git repo --rev abc123</text>
  <text x="106" y="614" fill="#D8E3F0" font-family="Consolas, Menlo, monospace" font-size="20">rex install</text>
  <text x="232" y="614" fill="#E5B54B" font-family="Segoe UI, Arial, sans-serif" font-size="20">-&gt;</text>
  <text x="266" y="614" fill="#D8E3F0" font-family="Consolas, Menlo, monospace" font-size="20">rex.lock</text>

  <rect x="590" y="418" width="612" height="226" rx="24" fill="#101A2D" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
  <text x="618" y="462" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Repository Surface</text>

  <rect x="618" y="496" width="170" height="54" rx="14" fill="#16233C" stroke="#35537F"/>
  <text x="640" y="529" fill="#F8FAFC" font-family="Consolas, Menlo, monospace" font-size="19">rex/compiler</text>

  <rect x="812" y="496" width="170" height="54" rx="14" fill="#16233C" stroke="#4F8A77"/>
  <text x="834" y="529" fill="#F8FAFC" font-family="Consolas, Menlo, monospace" font-size="19">rex/runtime_c</text>

  <rect x="1006" y="496" width="170" height="54" rx="14" fill="#16233C" stroke="#6B62A7"/>
  <text x="1038" y="529" fill="#F8FAFC" font-family="Consolas, Menlo, monospace" font-size="19">rex/examples</text>

  <rect x="618" y="574" width="170" height="54" rx="14" fill="#16233C" stroke="#B8872D"/>
  <text x="664" y="607" fill="#F8FAFC" font-family="Consolas, Menlo, monospace" font-size="19">docs</text>

  <text x="812" y="588" fill="#D8E3F0" font-family="Segoe UI, Arial, sans-serif" font-size="19">compiler, runtime, examples, docs, website,</text>
  <text x="812" y="614" fill="#D8E3F0" font-family="Segoe UI, Arial, sans-serif" font-size="19">and services in one working repository.</text>
