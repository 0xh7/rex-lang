  <text x="1040" y="286" fill="#D8E3F0" font-family="Segoe UI, Arial, sans-serif" font-size="18">io</text>
  <text x="1070" y="286" fill="#D8E3F0" font-family="Segoe UI, Arial, sans-serif" font-size="18">fs</text>
  <text x="1100" y="286" fill="#D8E3F0" font-family="Segoe UI, Arial, sans-serif" font-size="18">time</text>
  <text x="1150" y="286" fill="#D8E3F0" font-family="Segoe UI, Arial, sans-serif" font-size="18">json</text>
  <text x="1040" y="318" fill="#9FB5D4" font-family="Segoe UI, Arial, sans-serif" font-size="18">http</text>
  <text x="1085" y="318" fill="#9FB5D4" font-family="Segoe UI, Arial, sans-serif" font-size="18">ui</text>
  <text x="1110" y="318" fill="#9FB5D4" font-family="Segoe UI, Arial, sans-serif" font-size="18">audio</text>

