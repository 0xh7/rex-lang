<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" fill="none">
  <defs>
    <linearGradient id="bg" x1="100" y1="40" x2="1180" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F1D35"/>
      <stop offset="1" stop-color="#0A1324"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#172B4D"/>
      <stop offset="1" stop-color="#101B31"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EAC46A"/>
      <stop offset="1" stop-color="#B8872D"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1280" height="420" rx="28" fill="url(#bg)"/>
  <text x="72" y="80" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Package Workflow</text>
  <text x="72" y="114" fill="#9FB5D4" font-family="Segoe UI, Arial, sans-serif" font-size="20">Local packages and pinned git dependencies flow through the same manifest and lockfile.</text>

  <rect x="72" y="164" width="280" height="176" rx="22" fill="url(#panel)" stroke="#35537F" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="212" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Project Root</text>
  <text x="100" y="250" fill="#D8E3F0" font-family="Consolas, Menlo, monospace" font-size="18">rex.toml</text>
  <text x="100" y="280" fill="#D8E3F0" font-family="Consolas, Menlo, monospace" font-size="18">src/main.rex</text>
  <text x="100" y="314" fill="#9FB5D4" font-family="Segoe UI, Arial, sans-serif" font-size="18">manifest, entry,</text>
  <text x="100" y="338" fill="#9FB5D4" font-family="Segoe UI, Arial, sans-serif" font-size="18">project metadata</text>

  <rect x="386" y="164" width="280" height="176" rx="22" fill="url(#panel)" stroke="#4F8A77" stroke-width="2" filter="url(#shadow)"/>
  <text x="414" y="212" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Sources</text>
  <text x="414" y="250" fill="#D8E3F0" font-family="Consolas, Menlo, monospace" font-size="18">path ../utils</text>
  <text x="414" y="280" fill="#D8E3F0" font-family="Consolas, Menlo, monospace" font-size="18">git repo @ abc123</text>
  <text x="414" y="314" fill="#9FB5D4" font-family="Segoe UI, Arial, sans-serif" font-size="18">local paths and</text>
  <text x="414" y="338" fill="#9FB5D4" font-family="Segoe UI, Arial, sans-serif" font-size="18">pinned git inputs</text>

  <rect x="700" y="164" width="250" height="176" rx="22" fill="url(#panel)" stroke="#6B62A7" stroke-width="2" filter="url(#shadow)"/>
  <text x="728" y="212" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Commands</text>
  <text x="728" y="250" fill="#D8E3F0" font-family="Consolas, Menlo, monospace" font-size="18">rex add</text>
  <text x="728" y="280" fill="#D8E3F0" font-family="Consolas, Menlo, monospace" font-size="18">rex deps</text>
  <text x="728" y="310" fill="#D8E3F0" font-family="Consolas, Menlo, monospace" font-size="18">rex install</text>

  <rect x="984" y="164" width="224" height="176" rx="22" fill="url(#panel)" stroke="#B8872D" stroke-width="2" filter="url(#shadow)"/>
  <text x="1012" y="212" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Result</text>
  <text x="1012" y="250" fill="#D8E3F0" font-family="Consolas, Menlo, monospace" font-size="18">rex.lock</text>
  <text x="1012" y="282" fill="#D8E3F0" font-family="Segoe UI, Arial, sans-serif" font-size="18">resolved graph</text>
  <text x="1012" y="312" fill="#9FB5D4" font-family="Segoe UI, Arial, sans-serif" font-size="18">repeatable state</text>

  <path d="M352 250H368" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
  <path d="M368 250L354 239" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
  <path d="M368 250L354 261" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>

  <path d="M666 250H682" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
  <path d="M682 250L668 239" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
  <path d="M682 250L668 261" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>

  <path d="M950 250H966" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
  <path d="M966 250L952 239" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
  <path d="M966 250L952 261" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
</svg>
